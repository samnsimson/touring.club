_format_version: '3.0'

# POC: declarative (DB-less) Kong config routing each backend microservice through a single
# gateway entry point (http://localhost:8000). Services run on the host (via `bun run start:prod`),
# not in this Docker network, so Kong reaches them through `host.docker.internal`.
# Each route maps 1:1 to a service's `globalPrefix`/`@Controller()` path — see AGENTS.md "Current Projects".

services:
    - name: auth-service
      url: http://host.docker.internal:3000
      routes:
          - name: auth-service-route
            paths:
                - /api/v1/auth
            strip_path: false

    - name: users-service
      url: http://host.docker.internal:3001
      routes:
          - name: users-service-route
            paths:
                - /api/v1/profiles
            strip_path: false

    - name: trips-service
      url: http://host.docker.internal:3002
      routes:
          - name: trips-service-route
            paths:
                - /api/v1/trips
            strip_path: false

    - name: messaging-service
      url: http://host.docker.internal:3003
      routes:
          - name: messaging-service-route
            paths:
                - /api/v1/conversations
            strip_path: false

    - name: notifications-service
      url: http://host.docker.internal:3004
      routes:
          - name: notifications-service-route
            paths:
                - /api/v1/notifications
            strip_path: false

plugins:
    - name: cors
      config:
          origins:
              - '*'
          methods:
              - GET
              - POST
              - PATCH
              - PUT
              - DELETE
              - OPTIONS
          headers:
              - Accept
              - Authorization
              - Content-Type
          credentials: true
