services:
  postgres:
    image: postgres:17-alpine
    container_name: touring-club-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: touring_club
    volumes:
      - touring_club_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d touring_club']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  touring_club_postgres_data:
