services:
    postgres:
        image: postgres:17-alpine
        container_name: touring-club-postgres
        restart: unless-stopped
        ports:
            - '${POSTGRES_PORT:-5433}:5432'
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: touring_club
        volumes:
            - touring_club_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d touring_club']
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - touring-club

    kong:
        image: kong:3.9
        container_name: touring-club-kong
        restart: unless-stopped
        environment:
            KONG_DATABASE: 'off'
            KONG_DECLARATIVE_CONFIG: /kong/kong.yml
            KONG_PROXY_LISTEN: '0.0.0.0:8000'
            KONG_ADMIN_LISTEN: '0.0.0.0:8001'
            KONG_PROXY_ACCESS_LOG: /dev/stdout
            KONG_ADMIN_ACCESS_LOG: /dev/stdout
            KONG_PROXY_ERROR_LOG: /dev/stderr
            KONG_ADMIN_ERROR_LOG: /dev/stderr
        ports:
            - '8000:8000' # gateway entry point — all client traffic goes here
            - '8001:8001' # admin API — local POC only, do not expose in real environments
        volumes:
            - ./infra/kong/kong.yml:/kong/kong.yml:ro
        extra_hosts:
            - 'host.docker.internal:host-gateway' # lets Kong reach services running on the host via `nx serve`/`start:prod`, not just other containers
        networks:
            - touring-club

    jenkins:
        build:
            context: ./infra/jenkins
            dockerfile: Dockerfile
        container_name: touring-club-jenkins
        restart: unless-stopped
        ports:
            - '8080:8080'
            - '50000:50000'
        env_file:
            - path: infra/jenkins/.env
              required: false
        environment:
            CASC_JENKINS_CONFIG: /var/jenkins_home/casc_config
            JAVA_OPTS: >-
                -Djenkins.install.runSetupWizard=false
                -Djava.awt.headless=true
            JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin}
            JENKINS_URL: ${JENKINS_URL:-http://localhost:8080/}
            GITHUB_USERNAME: ${GITHUB_USERNAME:-samnsimson}
            GITHUB_TOKEN: ${GITHUB_TOKEN:-}
            BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-dev-better-auth-secret-32chars}
            JENKINS_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/touring_club
        volumes:
            - jenkins_home:/var/jenkins_home
            - ./infra/jenkins/casc:/var/jenkins_home/casc_config:ro
            - /var/run/docker.sock:/var/run/docker.sock
            - .:/workspace:ro
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - touring-club

networks:
    touring-club:
        name: touring-club

volumes:
    touring_club_postgres_data:
    jenkins_home:
