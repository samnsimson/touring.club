services:
    postgres:
        image: postgres:17-alpine
        container_name: touring-club-postgres
        restart: unless-stopped
        ports:
            - '${POSTGRES_PORT:-5433}:5432'
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: touring_club
        volumes:
            - touring_club_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d touring_club']
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - touring-club

    kong:
        image: kong:3.9
        container_name: touring-club-kong
        restart: unless-stopped
        environment:
            KONG_DATABASE: 'off'
            KONG_DECLARATIVE_CONFIG: /kong/kong.yml
            KONG_PROXY_LISTEN: '0.0.0.0:8000'
            KONG_ADMIN_LISTEN: '0.0.0.0:8001'
            KONG_PROXY_ACCESS_LOG: /dev/stdout
            KONG_ADMIN_ACCESS_LOG: /dev/stdout
            KONG_PROXY_ERROR_LOG: /dev/stderr
            KONG_ADMIN_ERROR_LOG: /dev/stderr
        ports:
            - '8000:8000' # gateway entry point — all client traffic goes here
            - '8001:8001' # admin API — local POC only, do not expose in real environments
        volumes:
            - ./infra/kong/kong.yml:/kong/kong.yml:ro
        extra_hosts:
            - 'host.docker.internal:host-gateway' # lets Kong reach services running on the host via `nx serve`/`start:prod`, not just other containers
        networks:
            - touring-club

networks:
    touring-club:
        name: touring-club

volumes:
    touring_club_postgres_data:
